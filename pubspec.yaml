name: sentra_app
description: "Sentra - Smart Budget & Keuangan"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  google_mlkit_text_recognition: ^0.13.1
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  path_provider_android: 2.2.14
  google_generative_ai: ^0.4.6
  speech_to_text: ^7.3.0
  http: ^1.2.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/sentra_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F1923"
  adaptive_icon_foreground: "assets/images/sentra_logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/

dependency_overrides:
  path_provider_android: 2.2.14
  shared_preferences_windows: 2.3.2
  path_provider_windows: 2.2.1
