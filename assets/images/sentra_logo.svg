<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2D3D;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient for coin/ring -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#E8A020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C97B10;stop-opacity:1" />
    </linearGradient>
    <!-- Teal gradient for scan beam -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="160"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" clip-path="url(#circleClip)">
    <line x1="80" y1="40" x2="80" y2="360" stroke="white" stroke-width="1"/>
    <line x1="120" y1="40" x2="120" y2="360" stroke="white" stroke-width="1"/>
    <line x1="160" y1="40" x2="160" y2="360" stroke="white" stroke-width="1"/>
    <line x1="200" y1="40" x2="200" y2="360" stroke="white" stroke-width="1"/>
    <line x1="240" y1="40" x2="240" y2="360" stroke="white" stroke-width="1"/>
    <line x1="280" y1="40" x2="280" y2="360" stroke="white" stroke-width="1"/>
    <line x1="320" y1="40" x2="320" y2="360" stroke="white" stroke-width="1"/>
    <line x1="40" y1="80" x2="360" y2="80" stroke="white" stroke-width="1"/>
    <line x1="40" y1="120" x2="360" y2="120" stroke="white" stroke-width="1"/>
    <line x1="40" y1="160" x2="360" y2="160" stroke="white" stroke-width="1"/>
    <line x1="40" y1="200" x2="360" y2="200" stroke="white" stroke-width="1"/>
    <line x1="40" y1="240" x2="360" y2="240" stroke="white" stroke-width="1"/>
    <line x1="40" y1="280" x2="360" y2="280" stroke="white" stroke-width="1"/>
    <line x1="40" y1="320" x2="360" y2="320" stroke="white" stroke-width="1"/>
  </g>

  <!-- Receipt / document shape -->
  <g filter="url(#softGlow)">
    <rect x="128" y="100" width="144" height="190" rx="10" ry="10" fill="#1E3448" stroke="#2A4A64" stroke-width="1.5"/>
    <!-- Receipt jagged bottom -->
    <polyline points="128,270 140,285 152,270 164,285 176,270 188,285 200,270 212,285 224,270 236,285 248,270 260,285 272,270" fill="none" stroke="#2A4A64" stroke-width="1.5"/>
    <rect x="128" y="270" width="144" height="20" rx="0" ry="0" fill="#1E3448"/>
    <!-- Jagged edge fill -->
    <polygon points="128,270 140,285 152,270 164,285 176,270 188,285 200,270 212,285 224,270 236,285 248,270 260,285 272,270 272,290 128,290" fill="#1E3448"/>

    <!-- Receipt lines -->
    <rect x="148" y="122" width="60" height="6" rx="3" fill="#2E5070" opacity="0.8"/>
    <rect x="148" y="138" width="104" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>
    <rect x="148" y="150" width="80" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>

    <!-- Divider -->
    <line x1="143" y1="163" x2="257" y2="163" stroke="#2E5070" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Item rows -->
    <rect x="148" y="173" width="70" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>
    <rect x="230" y="173" width="22" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>
    <rect x="148" y="187" width="55" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>
    <rect x="230" y="187" width="22" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>
    <rect x="148" y="201" width="63" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>
    <rect x="230" y="201" width="22" height="5" rx="2.5" fill="#2E5070" opacity="0.5"/>

    <!-- Divider -->
    <line x1="143" y1="215" x2="257" y2="215" stroke="#2E5070" stroke-width="1"/>

    <!-- Total row highlighted -->
    <rect x="148" y="225" width="35" height="6" rx="3" fill="#00D4AA" opacity="0.7"/>
    <rect x="218" y="225" width="34" height="6" rx="3" fill="url(#goldGrad)" opacity="0.9"/>
  </g>

  <!-- Coin / Budget ring - overlapping receipt -->
  <circle cx="265" cy="155" r="52" fill="#0F1923" opacity="0.6"/>
  <circle cx="265" cy="155" r="48" fill="none" stroke="url(#goldGrad)" stroke-width="7" filter="url(#glow)"/>
  <circle cx="265" cy="155" r="36" fill="url(#goldGrad)" opacity="0.15"/>

  <!-- Rupiah symbol inside coin -->
  <text x="265" y="165" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" filter="url(#softGlow)">Rp</text>

  <!-- Scan beam across receipt -->
  <rect x="115" y="193" width="170" height="3" rx="1.5" fill="url(#tealGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Scan line dots on sides -->
  <circle cx="118" cy="194.5" r="4" fill="#00D4AA" opacity="0.8" filter="url(#glow)"/>
  <circle cx="282" cy="194.5" r="4" fill="#00D4AA" opacity="0.8" filter="url(#glow)"/>

  <!-- Corner scan brackets on receipt -->
  <!-- Top-left -->
  <path d="M 133 115 L 133 108 L 140 108" stroke="#00D4AA" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Top-right -->
  <path d="M 267 115 L 267 108 L 260 108" stroke="#00D4AA" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom-left -->
  <path d="M 133 278 L 133 285 L 140 285" stroke="#00D4AA" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom-right -->
  <path d="M 267 278 L 267 285 L 260 285" stroke="#00D4AA" stroke-width="2.5" fill="none" stroke-linecap="round"/>

</svg>
